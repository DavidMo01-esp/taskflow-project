<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PRIMER EJERCICIO</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>PRIMER EJERCICIO</h1>
  </header>

  <div class="container">

    <aside class="sidebar">
      <h2>Menú</h2>
      <ul>
        <li>Inicio</li>
        <li>Tareas</li>
        <li>Configuración</li>
      </ul>
    </aside>

    <main>

      <section class="task-creator">
        <form id="task-form">
          <input type="text" id="task-input" placeholder="Añadir tarea" required>
          
          <select id="priority-select">
            <option value="Alta">Prioridad Alta</option>
            <option value="Media">Prioridad Media</option>
            <option value="Baja">Prioridad Baja</option>
          </select>

          <button type="submit">Añadir</button>
        </form>

      
        <input type="text" id="search-input" placeholder="Buscar tarea..." class="search-input">
      </section>

     
      <section class="task-list" id="task-list"></section>

    </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
