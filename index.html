<!DOCTYPE html>
<html lang = "es">
<head>
<meta charset = "UTF-8">
<meta name = "viewport" content = "width=device-width, initial-scale = 1">
<title>PRIMER EJERCICIO</title>
<link rel = "stylesheet" href = "style.css">
</head>
<body>

  <header>
    <h1>PRIMER EJERCICIO</h1>
  </header>

  <div class="container">

    <aside class="sidebar">
      <h2>Menú</h2>
      <ul>
        <li>Inicio</li>
        <li>Proyectos</li>
        <li>Configuración</li>
      </ul>
    </aside>

    <main>
      <section class="task-list">

        <article class="task">
          <div class="task-info">
            <h3>TAREA 1</h3>
            <span class="category">Trabajo Secundario</span>
          </div>
          <span class="priority high">Prioridad Alta</span>
        </article>

        <article class="task">
          <div class="task-info">
            <h3>TAREA 2</h3>
            <span class="category">Trabajo Secundario</span>
          </div>
          <span class="priority medium">Prioridad Media</span>
        </article>

        <article class="task">
          <div class="task-info">
            <h3>TAREA 3</h3>
            <span class="category">Trabajo Terciario</span>
          </div>
          <span class="priority low">Prioridad Baja</span>
        </article>

      </section>
    </main>

  </div>

</body>
